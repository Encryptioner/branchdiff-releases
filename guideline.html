<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Guide — branchdiff</title>
  <meta name="description" content="branchdiff user guide." />
  <link rel="icon" type="image/svg+xml" href="./assets/logo.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./styles/main.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" />
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
  <header class="sticky top-0 z-30 bg-white/80 backdrop-blur border-b border-slate-200">
    <nav class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center justify-between">
      <a href="./" class="flex items-center gap-2 font-semibold">
        <img src="./assets/logo.svg" alt="" class="h-7 w-7" />
        <span>branchdiff</span>
      </a>
      <!-- Desktop nav -->
      <div class="hidden sm:flex items-center gap-1 text-sm">
        <a href="./" class="px-3 py-2 rounded text-slate-700 hover:bg-slate-100">Home</a>
        <a href="./guideline.html" class="px-3 py-2 rounded text-slate-900 bg-slate-100">Guide</a>
        <a href="./changelog.html" class="px-3 py-2 rounded text-slate-700 hover:bg-slate-100">Changelog</a>
      </div>
      <!-- Mobile hamburger -->
      <button id="mobile-menu-btn" class="sm:hidden p-2 rounded text-slate-700 hover:bg-slate-100" aria-label="Toggle menu">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </nav>
    <div id="mobile-menu" class="hidden sm:hidden bg-white border-b border-slate-200 px-4 pb-4">
      <a href="./" class="block px-3 py-2 rounded text-slate-700 hover:bg-slate-100">Home</a>
      <a href="./guideline.html" class="block px-3 py-2 rounded text-slate-900 bg-slate-100">Guide</a>
      <a href="./changelog.html" class="block px-3 py-2 rounded text-slate-700 hover:bg-slate-100">Changelog</a>
    </div>
  </header>

  <article class="prose-content" id="content">
    <p class="text-slate-500">Loading…</p>
  </article>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <script>
    fetch('./content/guideline.md')
      .then(r => r.ok ? r.text() : Promise.reject(r.status))
      .then(md => {
        document.getElementById('content').innerHTML = marked.parse(md);
        Prism.highlightAll();
        document.title = 'Guide — branchdiff';
      })
      .catch(err => {
        document.getElementById('content').innerHTML =
          '<p class="text-rose-700">Failed to load guideline content (' + err + '). The CI sync job populates <code>content/guideline.md</code> on each release.</p>';
      });

    // Mobile nav toggle
    document.getElementById('mobile-menu-btn')?.addEventListener('click', () => {
      document.getElementById('mobile-menu')?.classList.toggle('hidden');
    });
  </script>
</body>
</html>
