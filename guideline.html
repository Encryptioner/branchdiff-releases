<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Guide — branchdiff</title>
  <meta name="description" content="branchdiff user guide." />
  <link rel="icon" type="image/svg+xml" href="./assets/logo.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./styles/main.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" />
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
  <div id="site-header"></div>

  <article class="prose-content" id="content">
    <p class="text-slate-500">Loading…</p>
  </article>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <script src="./scripts/shared.js"></script>
  <script>
    // Try CI-synced content first, then fall back to content/ files that ship with the repo.
    const SOURCES = ['./content/GUIDELINE.md'];
    const CONTENT_EL = document.getElementById('content');

    async function loadContent() {
      for (const src of SOURCES) {
        try {
          const res = await fetch(src);
          if (!res.ok) continue;
          const md = await res.text();
          if (!md.trim()) continue;
          CONTENT_EL.innerHTML = marked.parse(md);
          Prism.highlightAll();
          return;
        } catch { /* try next source */ }
      }
      CONTENT_EL.innerHTML =
        '<p class="text-rose-700">Content is loading. The CI sync job populates this page on each release. If you just deployed, it should appear shortly.</p>';
    }
    loadContent();
  </script>
</body>
</html>
