<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Changelog — branchdiff</title>
  <meta name="description" content="branchdiff release history." />
  <link rel="icon" type="image/svg+xml" href="./assets/logo.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./styles/main.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" />
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
  <header class="sticky top-0 z-30 bg-white/80 backdrop-blur border-b border-slate-200">
    <nav class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center justify-between">
      <a href="./" class="flex items-center gap-2 font-semibold">
        <img src="./assets/logo.svg" alt="" class="h-7 w-7" />
        <span>branchdiff</span>
      </a>
      <div class="flex items-center gap-1 sm:gap-3 text-sm">
        <a href="./" class="px-3 py-2 rounded text-slate-700 hover:bg-slate-100">Home</a>
        <a href="./guideline.html" class="px-3 py-2 rounded text-slate-700 hover:bg-slate-100">Guide</a>
        <a href="./changelog.html" class="px-3 py-2 rounded text-slate-900 bg-slate-100">Changelog</a>
      </div>
    </nav>
  </header>

  <article class="prose-content" id="content">
    <p class="text-slate-500">Loading…</p>
  </article>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <script>
    fetch('./content/changelog.md')
      .then(r => r.ok ? r.text() : Promise.reject(r.status))
      .then(md => {
        document.getElementById('content').innerHTML = marked.parse(md);
        Prism.highlightAll();
      })
      .catch(err => {
        document.getElementById('content').innerHTML =
          '<p class="text-rose-700">Failed to load changelog (' + err + '). The CI sync job populates <code>content/changelog.md</code> on each release.</p>';
      });
  </script>
</body>
</html>
